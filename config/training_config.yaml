method: sft
metrics:
  min_delta: 0.001
  patience: 5
optimizer:
  type: adam
training:
  batch_size: 4
  grad_checkpoint: true
  iters: 2000
  learning_rate: 1.0e-05
  steps_per_eval: 50
dpo:
  beta: 0.1        # DPO preference strength (only used when method=dpo)
  from_base: false # false = continue from the SFT-fused model; true = fresh LoRA on base
