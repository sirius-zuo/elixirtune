teacher:
  base_url: http://localhost:90909/v1
  model: Qwen3.6-35B-A3B-GGUF
  api_key: ""
  temperature: 0.8
bootstrap:
  starter_count: 20
generate:
  target_size: 2000
  fewshot_k: 4
  cot: true
  max_miss_factor: 5
  batch_size: 5        # distinct pairs requested per teacher call
  num_topics: 40       # diverse sub-topics planned per run to steer generation
refine:
  passes: []
  self_refine: {model: qwen3.6}
  critique_revise: {model: qwen3.6}
filter:
  schema: {max_tokens: 2048}
  dedup: {embedding_model: all-MiniLM-L6-v2, similarity_threshold: 0.92}
  judge: {model: qwen3.6, score_cutoff: 4}
  diversity: {quotas: {bug: 1.0}}
dpo_data:
  teacher_samples: 2   # teacher candidate answers per prompt (0 to disable)
  use_sft: true        # include the SFT-fused model as a candidate source
  use_base: true       # include the base model as a candidate source
  min_margin: 2        # min judge-score gap (1-5) to keep a chosen/rejected pair
  max_prompts: 200     # cap on prompts to build preferences for
  max_tokens: 256      # max tokens per generated candidate
